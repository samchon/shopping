services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
      - "37001:37001"
    environment:
      SHOPPING_POSTGRES_HOST: postgres
      NEXT_PUBLIC_SHOPPING_API_HOST: http://127.0.0.1:37001
      NEXT_PUBLIC_SHOPPING_API_SIMULATE: "false"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
